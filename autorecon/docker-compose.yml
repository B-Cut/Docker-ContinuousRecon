version: '3.8'

services:
  recon:
    image: autorecon:recon
    ports:
      - "1337:1337"
    volumes:
      - ./recon:/recon
    env_file:
      - .env
    build:
      context: ReconPipeline

  scheduler:
    image: autorecon:scheduler
    env_file:
      - .env
    build:
      context: Scheduler
    depends_on:
      - recon
